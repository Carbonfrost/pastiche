services:
- name: "@graphql/introspection"
  comment: GraphQL Introspection
  resources:
  - name: graphql
    uri: /graphql
    post:
      body: |
        query IntrospectionQuery {
          __schema {
            queryType { name }
            mutationType { name }
            subscriptionType { name }
            types {
              ...FullType
            }
            directives {
              name
              description
              locations
              args {
                ...InputValue
              }
            }
          }
        }
        fragment FullType on __Type {
          kind
          name
          description
          fields(includeDeprecated: true) {
            name
            description
            args {
              ...InputValue
            }
            type {
              ...TypeRef
            }
            isDeprecated
            deprecationReason
          }
          inputFields {
            ...InputValue
          }
          interfaces {
            ...TypeRef
          }
          enumValues(includeDeprecated: true) {
            name
            description
            isDeprecated
            deprecationReason
          }
          possibleTypes {
            ...TypeRef
          }
        }
        fragment InputValue on __InputValue {
          name
          description
          type { ...TypeRef }
          defaultValue
        }
        fragment TypeRef on __Type {
          kind
          name
          ofType {
            kind
            name
            ofType {
              kind
              name
              ofType {
                kind
                name
                ofType {
                  kind
                  name
                  ofType {
                    kind
                    name
                    ofType {
                      kind
                      name
                      ofType {
                        kind
                        name
                      }
                    }
                  }
                }
              }
            }
          }
        }
- name: httpbin
  title: httpbin.org
  description: A simple HTTP Request & Response Service.
  servers:
  - baseUrl: https://httpbin.org/
    name: production
  resources:
  - delete: {}
    name: delete
    uri: /delete
  - get: {}
    name: get
    uri: /get
  - name: patch
    patch: {}
    uri: /patch
  - name: post
    post: {}
    uri: /post
  - name: put
    put: {}
    uri: /put
  - get: {}
    name: status
    resources:
    - get: {}
      name: codes
      uri: /{codes}
    uri: /status
